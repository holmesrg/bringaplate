<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <!-- First Column -->
            <div class="col-md-6">
                <button type="button" class="btn btn-primary btn-block mb-2">Button 1</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 2</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 3</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 4</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 5</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 6</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 7</button>
            </div>
            <!-- Second Column -->
            <div class="col-md-6">
                <button type="button" class="btn btn-primary btn-block mb-2">Button 8</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 9</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 10</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 11</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 12</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 13</button>
                <button type="button" class="btn btn-primary btn-block mb-2">Button 14</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
